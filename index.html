@import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,600;1,400&family=Inter:wght@400;500;600&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:          #FCFCFB;
  --surface:     #FFFFFF;
  --inset:       #F4F4F1;
  --ink:         #1B1C18;
  --muted:       #74756C;
  --faint:       #9A9B90;
  --line:        #E7E6E0;
  --line-strong: #D9D8D1;
  --accent:      #406399;
  --accent-soft: #E6EDF7;
  --accent-ink:  #34527E;
  --now:         #B26A2B;
  --now-soft:    #F7ECDD;
  --danger:      #B4504A;
  --danger-soft: #FAF0EF;
}

html, body { background: var(--bg); color: var(--ink); font-family: 'Inter', sans-serif;
  -webkit-font-smoothing: antialiased; min-height: 100vh; min-height: 100dvh; }
#root { min-height: 100vh; min-height: 100dvh; }

.tj-serif { font-family: 'Fraunces', serif; }
.tj-num   { font-variant-numeric: tabular-nums; }

/* ── Wrap ── */
.tj-wrap { max-width: 540px; margin: 0 auto; padding: 0 16px 80px; }

/* ── Sticky bar ── */
.tj-stickybar { position: sticky; top: 0; z-index: 20; background: var(--bg);
  padding: 14px 16px 10px; margin: 0 -16px; transition: box-shadow .2s; }
.tj-stickybar[data-scrolled="true"] { box-shadow: 0 6px 12px -8px rgba(20,22,18,.16); }

/* ── Tabs ── */
.tj-tabs { display: flex; gap: 4px; background: var(--inset); padding: 4px;
  border-radius: 12px; margin-bottom: 0; }
.tj-tab { flex: 1; border: 0; background: transparent; border-radius: 9px; padding: 8px;
  font-size: 14px; font-weight: 500; color: var(--muted); cursor: pointer; font-family: inherit; transition: all .15s; }
.tj-tab[data-active="true"] { background: var(--surface); color: var(--ink); font-weight: 600;
  box-shadow: 0 1px 3px rgba(0,0,0,.08); }

/* ── Header ── */
.tj-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; margin-bottom: 12px; }
.tj-clock  { display: flex; align-items: baseline; gap: 8px; color: var(--muted); font-size: 13px; }
.tj-live   { display: inline-block; width: 7px; height: 7px; border-radius: 50%;
  background: var(--now); margin-right: 3px; animation: pulse 2.4s infinite; }
@keyframes pulse { 0%,100%{ opacity:1; } 50%{ opacity:.4; } }
.tj-editbtn { border: 1px solid var(--line); background: var(--surface); color: var(--faint);
  width: 34px; height: 34px; border-radius: 10px; display: flex; align-items: center;
  justify-content: center; cursor: pointer; }
.tj-editbtn svg { width: 15px; height: 15px; stroke: currentColor; fill: none; stroke-width: 1.7; }

/* ── Day pills ── */
.tj-days { display: flex; gap: 8px; padding: 2px 4px 14px; overflow-x: auto;
  -webkit-overflow-scrolling: touch; scrollbar-width: none; scroll-snap-type: x proximity;
  cursor: grab; user-select: none; }
.tj-days::-webkit-scrollbar { display: none; }
.tj-day { flex: 0 0 auto; border: 1px solid var(--line); background: var(--surface);
  border-radius: 12px; padding: 9px 14px; cursor: pointer; font-family: inherit;
  scroll-snap-align: start; text-align: left; }
.tj-day[data-active="true"] { background: var(--accent); border-color: var(--accent); }
.tj-day-k    { font-size: 10px; font-weight: 700; letter-spacing: .1em; color: var(--faint); }
.tj-day-date { font-size: 13px; font-weight: 700; color: var(--ink); margin: 2px 0 1px; }
.tj-day-theme{ font-size: 11px; color: var(--muted); white-space: nowrap; }
.tj-day[data-active="true"] .tj-day-k     { color: #CAD6EF; }
.tj-day[data-active="true"] .tj-day-date  { color: #fff; }
.tj-day[data-active="true"] .tj-day-theme { color: #AEC5D9; }
.tj-day-add  { flex: 0 0 auto; border: 1px dashed var(--line); background: transparent;
  border-radius: 12px; padding: 9px 14px; cursor: pointer; font-family: inherit;
  color: var(--faint); font-size: 13px; font-weight: 500; min-width: 72px; }

/* ── Day header (edit) ── */
.tj-day-title-row { display: flex; gap: 8px; align-items: flex-end; margin-bottom: 6px; }
.tj-day-label { font-size: 11px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase;
  color: var(--faint); margin-bottom: 12px; }
.tj-fi { width: 100%; border: 0; border-bottom: 1.5px solid var(--line-strong); border-radius: 0;
  padding: 7px 1px; font-size: 15px; font-family: inherit; background: transparent; color: var(--ink); }
.tj-fi:focus { outline: none; border-bottom-color: var(--accent); }
.tj-fi::placeholder { color: var(--faint); }
textarea.tj-fi { resize: vertical; min-height: 54px; line-height: 1.6; }
input[type="date"].tj-fi { height: 33px; padding: 0 1px; }
select.tj-fi { -webkit-appearance: none; appearance: none; line-height: 1.4; height: 33px; padding: 0 1px; }
.tj-field { margin-bottom: 14px; }
.tj-label { font-size: 11px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase;
  color: var(--faint); display: block; margin-bottom: 6px; }
.tj-two { display: flex; gap: 10px; }
.tj-two > .tj-field { flex: 1; }
.tj-del-row { display: flex; justify-content: flex-end; margin-bottom: 8px; }
.tj-mini { border: 0; background: none; font-size: 12px; font-weight: 600; cursor: pointer;
  font-family: inherit; padding: 2px 0; color: var(--danger); }

/* ── Timeline ── */
.tj-line { position: relative; padding-left: 56px; }
.tj-row  { position: relative; margin-bottom: 14px; }
.tj-time { position: absolute; left: -56px; top: 14px; width: 42px; text-align: right;
  font-size: 12px; font-weight: 600; color: var(--muted); font-variant-numeric: tabular-nums; }
.tj-card { border: 1px solid var(--line); background: var(--surface); border-radius: 14px;
  overflow: hidden; transition: border-color .15s; position: relative; }
.tj-card-head { position: relative; }
.tj-card[data-state="current"] { border-color: var(--now); border-width: 1.5px;
  box-shadow: 0 2px 10px rgba(178,106,43,.12); }
.tj-card[data-state="past"] .tj-card { opacity: .6; }
.tj-card-btn  { width: 100%; border: 0; background: transparent; padding: 13px 14px;
  cursor: pointer; color: var(--ink); font-family: inherit; text-align: left;
  display: flex; gap: 10px; align-items: flex-start; }
.tj-card-edit { position: absolute; top: 10px; right: 10px; border: 1px solid var(--line);
  background: var(--surface); border-radius: 8px; width: 30px; height: 30px; cursor: pointer;
  font-size: 14px; color: var(--muted); display: flex; align-items: center; justify-content: center; z-index: 3; }
.tj-card-handle { position: absolute; top: 0; left: 0; bottom: 0; width: 34px; border: 0;
  background: none; color: var(--line-strong); display: flex; align-items: center;
  justify-content: center; z-index: 3; cursor: grab; touch-action: none; opacity: .5; }
.tj-card-handle svg { width: 12px; height: 12px; }
.tj-type { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 700;
  padding: 3px 8px; border-radius: 20px; background: var(--inset); color: var(--muted);
  white-space: nowrap; flex-shrink: 0; }
.tj-c-main  { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 4px; }
.tj-c-title { font-size: 15px; font-weight: 600; color: var(--ink); }
.tj-c-brief { font-size: 13px; color: var(--muted); line-height: 1.45; }
.tj-chev    { font-size: 11px; color: var(--faint); margin-top: 2px; flex-shrink: 0; }
.tj-detail  { border-top: 1px solid var(--line); padding: 13px 14px 15px; background: var(--bg); }
.tj-notes   { font-size: 13px; line-height: 1.6; color: var(--ink); margin: 0 0 10px; }
.tj-loc     { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; color: var(--accent);
  text-decoration: none; font-weight: 500; }
.tj-addr    { font-size: 12.5px; color: var(--faint); margin-top: 4px; }
.tj-empty   { text-align: center; color: var(--faint); font-size: 14px; padding: 40px 0; line-height: 1.7; }
.tj-drop-ghost { border: 1.5px dashed var(--accent); border-radius: 14px;
  background: var(--accent-soft); height: 54px; margin-bottom: 14px; }
.tj-drag-floating { position: fixed; z-index: 50; pointer-events: none;
  width: min(calc(100vw - 96px), 444px); transform: translate(-50%,-50%); }
.tj-drag-floating .tj-card { box-shadow: 0 10px 24px rgba(20,22,18,.18); border-color: var(--accent); }
.tj-add-row { padding: 4px 0 16px; }
.tj-btn-add { width: 100%; border: 1px dashed var(--line); background: transparent; border-radius: 12px;
  padding: 9px; cursor: pointer; font-family: inherit; color: var(--faint); font-size: 13px; font-weight: 500; }

/* ── Meal options ── */
.tj-opt        { border: 1px solid var(--line); border-radius: 12px; padding: 11px 13px; margin-bottom: 8px; }
.tj-opt-head   { display: flex; align-items: center; gap: 8px; }
.tj-opt-name   { font-size: 14px; font-weight: 600; flex: 1; text-decoration: none; color: var(--accent); }
.tj-opt-meta   { font-size: 12px; color: var(--muted); }
.tj-pill       { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 20px; }
.tj-pill[data-res="true"] { background: var(--accent-soft); color: var(--accent-ink); }
.tj-res        { display: grid; grid-template-columns: auto 1fr; gap: 3px 10px; font-size: 12.5px;
  color: var(--muted); margin-top: 8px; }
.tj-res dt     { color: var(--faint); }

/* ── Overlay / sheet ── */
.tj-overlay { position: fixed; inset: 0; background: rgba(20,22,18,.42); display: flex;
  align-items: flex-end; justify-content: center; z-index: 40; }
.tj-sheet   { background: var(--bg); width: 100%; max-width: 540px; max-height: 90vh; overflow-y: auto;
  border-radius: 20px 20px 0 0; }
.tj-sheet-head { display: flex; align-items: center; justify-content: space-between;
  padding: 18px 18px 12px; border-bottom: 1px solid var(--line); position: sticky; top: 0;
  background: var(--bg); z-index: 1; }
.tj-sheet-foot { display: flex; gap: 9px; padding: 13px 18px; border-top: 1px solid var(--line);
  position: sticky; bottom: 0; background: var(--bg); }
.tj-sheet-body { padding: 18px; }
.tj-x { border: 0; background: none; font-size: 22px; color: var(--muted); cursor: pointer;
  line-height: 1; font-family: inherit; }

/* ── Buttons ── */
.tj-btn-primary { flex: 1; border: 0; background: var(--accent); color: #fff; border-radius: 11px;
  padding: 13px; font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit; }
.tj-btn-ghost   { border: 1px solid var(--line); background: var(--surface); color: var(--muted);
  border-radius: 11px; padding: 11px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; }
.tj-btn-danger  { border: 0; background: var(--danger-soft); color: var(--danger); border-radius: 11px;
  padding: 11px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; }
.tj-seg     { display: flex; gap: 6px; }
.tj-seg-btn { flex: 1; border: 1px solid var(--line); background: var(--surface); border-radius: 10px;
  padding: 9px 0; font-size: 13px; font-weight: 600; color: var(--muted); cursor: pointer; font-family: inherit; }
.tj-seg-btn[data-on="true"] { background: var(--accent); border-color: var(--accent); color: #fff; }
.tj-toggle  { display: flex; align-items: center; gap: 9px; cursor: pointer; font-size: 13px;
  font-weight: 600; color: var(--ink); }
.tj-sw      { width: 44px; height: 26px; border-radius: 13px; background: var(--line-strong);
  position: relative; transition: background .2s; flex-shrink: 0; }
.tj-toggle[data-on="true"] .tj-sw { background: var(--accent); }
.tj-sw::after { content:""; position: absolute; width: 20px; height: 20px; border-radius: 50%;
  background: #fff; top: 3px; left: 3px; transition: transform .2s; }
.tj-toggle[data-on="true"] .tj-sw::after { transform: translateX(18px); }

/* ── Expenses ── */
.tj-sl-head    { display: flex; align-items: center; justify-content: space-between; margin: 4px 0 14px; }
.tj-exp-row    { display: flex; align-items: flex-start; gap: 11px; padding: 13px 2px;
  border-bottom: 1px solid var(--line); cursor: pointer; }
.tj-exp-row[data-expanded="true"] { border-bottom-color: transparent; padding-bottom: 6px; }
.tj-pay-chip   { flex: 0 0 auto; width: 34px; height: 34px; border-radius: 50%; display: flex;
  align-items: center; justify-content: center; font-size: 11px; font-weight: 700;
  background: var(--inset); color: var(--muted); }
.tj-pay-chip[data-me="true"] { background: var(--accent-soft); color: var(--accent-ink); }
.tj-exp-main   { flex: 1; min-width: 0; }
.tj-exp-merchant { font-size: 14.5px; font-weight: 600; }
.tj-exp-sub2   { font-size: 12px; color: var(--faint); margin-top: 2px; }
.tj-exp-val    { flex-shrink: 0; font-size: 14.5px; font-weight: 600; text-align: right;
  font-variant-numeric: tabular-nums; }
.tj-exp-cat    { font-size: 11px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase;
  color: var(--faint); padding: 12px 0 5px; }
.tj-exp-detail { display: flex; align-items: center; gap: 11px; padding-bottom: 8px;
  border-bottom: 1px solid var(--line); }
.tj-exp-detail-gutter { flex: 0 0 auto; width: 34px; }
.tj-exp-detail-text { flex: 1; min-width: 0; font-size: 12.5px; color: var(--muted); line-height: 1.6; }
.tj-exp-note   { font-size: 12.5px; color: var(--faint); margin-top: 6px; line-height: 1.5; }
.tj-exp-actions{ flex: 0 0 auto; display: flex; gap: 4px; }
.tj-exp-icon-btn { border: 0; background: none; width: 26px; height: 26px; display: flex;
  align-items: center; justify-content: center; cursor: pointer; padding: 0; }
.tj-exp-icon-btn svg { width: 14px; height: 14px; stroke: currentColor; }
.tj-exp-icon-btn[data-act="edit"]   { color: var(--accent); }
.tj-exp-icon-btn[data-act="delete"] { color: var(--danger); }
.tj-exp-icon-btn[data-act="delete"][data-arm="true"] { color:#fff; background:var(--danger); border-radius:7px; }
.tj-live-tag   { display: inline-block; font-size: 10px; font-weight: 700; letter-spacing: .06em;
  color: var(--now); background: var(--now-soft); border-radius: 5px; padding: 1px 5px; }
.tj-diff       { font-size: 12px; margin-top: 6px; }
.tj-diff[data-ok="true"]  { color: var(--accent-ink); }
.tj-diff[data-ok="false"] { color: var(--danger); }
.tj-amount-line  { display: flex; align-items: center; gap: 5px; font-size: 15px; color: var(--ink);
  padding: 7px 1px; border-bottom: 1.5px solid var(--line-strong); }
.tj-amount-unit  { color: var(--faint); font-size: 13px; }
.tj-amount-input { flex: 1 1 0; min-width: 0; border: 0; background: transparent; color: var(--ink);
  font-size: 16px; font-weight: 600; font-family: inherit; padding: 0; }
.tj-amount-sep   { color: var(--faint); font-size: 12px; }
.tj-rate-input   { flex: 0 0 auto; width: 44px; border: 0; background: transparent; color: var(--ink);
  font-size: 13px; font-family: inherit; text-align: center; padding: 0; }
.tj-rate-input:focus { outline: none; }
.tj-amount-result{ flex: 0 0 auto; font-weight: 600; font-size: 13px;
  font-variant-numeric: tabular-nums; white-space: nowrap; }
.tj-time-picker { display: flex; align-items: center; gap: 5px; }
.tj-time-sel    { flex: 0 0 auto; width: 52px; text-align: center; height: 33px; padding: 0; }
.tj-time-colon  { color: var(--faint); font-weight: 600; }

/* ── Expense register (step entry) ── */
.tj-exp-topbar { display: flex; align-items: center; gap: 18px; margin: 4px 0 14px; }
.tj-exp-stat .k { font-size: 10.5px; letter-spacing: .06em; color: var(--faint); font-weight: 700; }
.tj-exp-stat .v { font-size: 15px; font-weight: 600; color: var(--ink); font-variant-numeric: tabular-nums; margin-top: 1px; }
.tj-filterrow { display: flex; gap: 5px; flex-wrap: wrap; margin: 8px 0 4px; }
.tj-settle-pill { margin-left: auto; border: 0; background: var(--accent); color: #fff; border-radius: 20px;
  padding: 8px 18px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; }
.tj-reg { background: var(--surface); border: 1px solid var(--line); border-radius: 16px;
  margin-bottom: 18px; overflow: hidden; box-shadow: 0 1px 3px rgba(20,22,18,.04); }
.tj-reg-receipt { display: flex; flex-wrap: wrap; gap: 4px; padding: 10px 14px;
  border-bottom: 1px solid var(--line); background: #FAFAF8; }
.tj-reg-seg { font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 12px;
  background: #EFEFEC; color: var(--faint); cursor: pointer; user-select: none; border: 0; font-family: inherit; }
.tj-reg-seg[data-state="filled"] { background: var(--accent-soft); color: var(--accent-ink); }
.tj-reg-seg[data-state="now"] { background: var(--accent); color: #fff; }
.tj-reg-stage { height: 200px; padding: 12px 14px; display: flex; flex-direction: column; }
.tj-reg-q { font-size: 13px; font-weight: 600; margin-bottom: 10px; display: flex;
  justify-content: space-between; align-items: baseline; }
.tj-reg-qn { font-size: 10.5px; font-weight: 600; color: #C0C1B8; }
.tj-reg-amt { font-family: 'Fraunces', serif; font-size: 23px; font-weight: 600; font-variant-numeric: tabular-nums; }
.tj-reg-amt .u { font-size: 13px; color: var(--faint); margin-right: 3px; font-family: 'Inter', sans-serif; }
.tj-reg-amt[data-empty="true"] { color: var(--line-strong); }
.tj-reg-opts { flex: 1; display: grid; gap: 7px; align-content: start; }
.tj-reg-opts[data-cols="2"] { grid-template-columns: 1fr 1fr; }
.tj-reg-opts[data-cols="3"] { grid-template-columns: 1fr 1fr 1fr; }
.tj-reg-ob { border: 1px solid var(--line); background: var(--surface); border-radius: 11px;
  padding: 12px 0; font-size: 13.5px; font-weight: 600; color: var(--ink); text-align: center;
  cursor: pointer; font-family: inherit; }
.tj-reg-ob:active { background: var(--inset); }
.tj-reg-ob[data-last="true"] { border-color: #8FA8CC; color: var(--accent-ink); background: #F0F5FB; }
.tj-reg-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.tj-reg-rowlbl { width: 34px; font-size: 11px; font-weight: 700; color: var(--faint); flex: 0 0 auto; }
.tj-reg-minis { flex: 1; display: flex; gap: 5px; }
.tj-reg-mini { flex: 1; border: 1px solid var(--line); background: var(--surface); border-radius: 9px;
  padding: 8px 0; font-size: 12.5px; font-weight: 600; color: var(--muted); cursor: pointer;
  font-family: inherit; text-align: center; }
.tj-reg-mini[data-on="true"] { background: var(--accent); border-color: var(--accent); color: #fff; }
.tj-reg-mini[data-last="true"] { border-color: #8FA8CC; color: var(--accent-ink); background: #F0F5FB; }
.tj-reg-item { border: 0; border-bottom: 1.5px solid var(--line-strong); font-size: 15px;
  font-family: inherit; background: none; padding: 7px 1px; width: 100%; color: var(--ink); }
.tj-reg-item:focus { outline: none; border-bottom-color: var(--accent); }
.tj-reg-hint { font-size: 11.5px; color: #C0C1B8; margin-top: 8px; }
.tj-reg-pad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; flex: 1; }
.tj-reg-key { border: 0; background: var(--inset); border-radius: 9px; font-size: 16px;
  font-weight: 600; font-family: inherit; color: var(--ink); cursor: pointer; user-select: none; }
.tj-reg-key:active { background: var(--line); }
.tj-reg-key[data-fn="true"] { font-size: 13px; color: var(--muted); }
.tj-reg-cust { flex: 1; display: flex; flex-direction: column; }
.tj-reg-custgrid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px 16px; align-content: start; }
.tj-reg-custcell { display: flex; align-items: center; gap: 7px; min-width: 0; }
.tj-reg-custnm { width: 28px; height: 28px; border-radius: 50%; background: var(--accent-soft);
  display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600;
  color: var(--accent-ink); flex: 0 0 auto; }
.tj-reg-custcell input { flex: 1; min-width: 0; width: 100%; border: 0; border-bottom: 1.5px solid var(--line-strong);
  background: none; font-size: 14px; font-weight: 600; font-family: inherit; color: var(--ink);
  padding: 4px 1px; font-variant-numeric: tabular-nums; }
.tj-reg-custcell input:focus { outline: none; border-bottom-color: var(--accent); }
.tj-reg-diff { margin-top: 12px; }
.tj-reg-diff { font-size: 11.5px; margin-top: 2px; }
.tj-reg-diff[data-ok="true"] { color: #4A7247; }
.tj-reg-diff[data-ok="false"] { color: var(--danger); }
.tj-reg-rate { display: flex; align-items: center; gap: 8px; font-size: 12.5px; color: var(--muted); margin-top: 10px; }
.tj-reg-rate input { width: 56px; border: 0; border-bottom: 1.5px solid var(--line-strong); background: none;
  text-align: center; font-size: 13px; font-family: inherit; padding: 3px 0; color: var(--ink); }
.tj-reg-rate input:focus { outline: none; border-bottom-color: var(--accent); }
.tj-reg-foot { display: flex; align-items: center; gap: 12px; padding: 12px 14px 14px; border-top: 1px solid var(--line); }
.tj-reg-back { border: 0; background: none; color: var(--faint); font-size: 13px; font-weight: 600;
  font-family: inherit; cursor: pointer; padding: 6px 2px; }
.tj-reg-next { flex: 1; border: 0; background: var(--accent); color: #fff; border-radius: 24px; padding: 13px;
  font-size: 14.5px; font-weight: 600; font-family: inherit; cursor: pointer; letter-spacing: .02em;
  box-shadow: 0 2px 8px rgba(64,99,153,.25); }
.tj-reg-next:active { transform: scale(.985); }
.tj-reg-next:disabled { opacity: .3; box-shadow: none; }
.tj-toastmsg { position: fixed; left: 50%; bottom: 28px; transform: translateX(-50%); background: var(--ink);
  color: #fff; font-size: 13px; font-weight: 600; border-radius: 20px; padding: 9px 18px; z-index: 60;
  animation: tjtoast 1.9s forwards; }
@keyframes tjtoast { 0% { opacity: 0; transform: translateX(-50%) translateY(14px); }
  12% { opacity: 1; transform: translateX(-50%) translateY(0); } 82% { opacity: 1; } 100% { opacity: 0; } }
.tj-listhead { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 2px; }
.tj-sortchip { border: 0; background: none; border-radius: 14px; padding: 5px 10px; font-size: 11.5px;
  font-weight: 600; color: var(--faint); cursor: pointer; font-family: inherit; }
.tj-sortchip[data-on="true"] { background: #EDEDE9; color: var(--ink); }
.tj-catselect { border: 0; background: none; border-radius: 14px; padding: 5px 10px; font-size: 11.5px;
  font-weight: 600; color: var(--faint); font-family: inherit; -webkit-appearance: none; appearance: none;
  cursor: pointer; }
.tj-catselect[data-on="true"] { background: #EDEDE9; color: var(--ink); }

/* ── Bottom nav / banner / stats ── */
.tj-nav { position: fixed; left: 0; right: 0; bottom: 0; z-index: 30; background: var(--surface);
  border-top: 1px solid var(--line); display: flex; align-items: flex-end; justify-content: space-around;
  padding: 6px 8px calc(10px + env(safe-area-inset-bottom)); max-width: 560px; margin: 0 auto; }
.tj-nav-item { border: 0; background: none; font-family: inherit; display: flex; flex-direction: column;
  align-items: center; gap: 3px; font-size: 10px; font-weight: 600; color: var(--faint); cursor: pointer;
  width: 60px; padding: 0; }
.tj-nav-item[data-on="true"] { color: var(--accent); }
.tj-nav-emoji { font-size: 20px; line-height: 1; filter: grayscale(1) opacity(.55); }
.tj-nav-item[data-on="true"] .tj-nav-emoji { filter: none; }
.tj-nav-fab { border: 0; background: var(--accent); width: 52px; height: 52px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center; margin-top: -22px;
  box-shadow: 0 4px 12px rgba(64,99,153,.35); cursor: pointer; font-size: 23px; line-height: 1;
  font-family: inherit; }
.tj-nav-fab:active { transform: scale(.95); }
.tj-exp-banner { background: var(--inset); border-radius: 14px; padding: 13px 16px; display: flex;
  gap: 16px; align-items: center; margin: 4px 0 16px; }
.tj-stats-modes { display: flex; gap: 6px; margin-bottom: 6px; }
.tj-stats-mode { flex: 1; border: 1px solid var(--line); background: var(--surface); border-radius: 9px;
  padding: 8px 0; font-size: 12.5px; font-weight: 600; color: var(--muted); cursor: pointer;
  font-family: inherit; text-align: center; }
.tj-stats-mode[data-on="true"] { background: var(--accent); border-color: var(--accent); color: #fff; }
.tj-donutwrap { display: flex; justify-content: center; padding: 10px 0 4px; position: relative; }
.tj-donutcenter { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); text-align: center; }
.tj-donutcenter .k { font-size: 10.5px; color: var(--faint); font-weight: 600; }
.tj-donutcenter .v { font-family: 'Fraunces', serif; font-size: 19px; font-weight: 600; font-variant-numeric: tabular-nums; }
.tj-leg { display: flex; align-items: center; gap: 9px; padding: 9px 2px; border-bottom: 1px solid var(--line); font-size: 13px; }
.tj-leg:last-child { border-bottom: 0; }
.tj-leg .dot { width: 10px; height: 10px; border-radius: 3px; flex: 0 0 auto; }
.tj-leg .nm { flex: 1; font-weight: 600; }
.tj-leg .amt { font-weight: 600; font-variant-numeric: tabular-nums; }
.tj-leg .pct { color: var(--faint); font-size: 12px; width: 40px; text-align: right; font-variant-numeric: tabular-nums; }
.tj-wrap { padding-bottom: 116px; }

/* ── Settlement ── */
.tj-settle { border: 1px solid var(--line); border-radius: 16px; background: var(--surface);
  padding: 16px; margin-top: 24px; }
.tj-settle h3 { font-family: 'Fraunces', serif; font-size: 17px; font-weight: 600; margin: 0 0 10px; }
.tj-settle-line { display: flex; justify-content: space-between; align-items: center;
  padding: 8px 0; border-bottom: 1px solid var(--line); }
.tj-settle-line:last-of-type { border-bottom: 0; }
.tj-settle-line .k { color: var(--muted); font-size: 13px; }
.tj-settle-line .v { font-size: 14px; font-weight: 600; font-variant-numeric: tabular-nums; }
.tj-settle-zero   { color: var(--faint); }
.tj-settle-btn    { width: 100%; border: 0; background: var(--accent); color: #fff; border-radius: 11px;
  padding: 12px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; margin-top: 14px; }
.tj-settle-btn[data-arm="true"] { background: var(--danger); }
.tj-settle-btn:disabled { opacity: .4; cursor: default; }
.tj-settle-cancel { display: block; width: 100%; text-align: center; background: none; border: 0;
  color: var(--muted); font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; padding: 10px 0 0; }
.tj-exp-settle-entry { flex: 0 0 auto; border: 0; background: none; color: var(--accent);
  padding: 0; height: 24px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit;
  display: flex; align-items: center; gap: 3px; }
.tj-exp-settle-entry svg { width: 18px; height: 18px; stroke: currentColor; }
.tj-exp-add-entry { flex: 0 0 auto; border: 0; background: none; color: var(--accent);
  width: 24px; height: 24px; display: flex; align-items: center; justify-content: center;
  cursor: pointer; padding: 0; transition: transform .18s; }
.tj-exp-add-entry svg { width: 20px; height: 20px; stroke: currentColor; }
.tj-exp-add-entry.tj-spin { transform: rotate(90deg); }
.tj-hist-date  { font-size: 12px; color: var(--faint); margin-bottom: 5px; }
.tj-hist       { border: 1px solid var(--line); border-radius: 12px; padding: 11px 13px;
  margin-bottom: 8px; background: var(--surface); cursor: pointer; }
.tj-hist-line  { font-size: 13px; display: flex; justify-content: space-between; padding: 2px 0; }
.tj-hist-line .v { font-variant-numeric: tabular-nums; font-weight: 600; }
.tj-changes    { margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--line); }
.tj-change-item{ font-size: 12px; color: var(--muted); line-height: 1.5; padding: 4px 0; }
.tj-ob-q       { font-size: 11px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase;
  color: var(--faint); margin: 0 0 10px; }

/* ── Onboarding / Trip list ── */
.tj-center     { min-height: 100vh; min-height: 100dvh; display: flex; align-items: center;
  justify-content: center; padding: 24px; }
.tj-card-pane  { width: 100%; max-width: 360px; }
.tj-ob-title   { font-family: 'Fraunces', serif; font-size: 26px; font-weight: 600; margin: 0 0 6px; }
.tj-ob-sub     { font-size: 13px; color: var(--muted); margin: 0 0 22px; line-height: 1.6; }
.tj-ob-code    { font-variant-numeric: tabular-nums; font-size: 16px; font-weight: 600;
  letter-spacing: .04em; word-break: break-all; background: var(--inset); border-radius: 10px;
  padding: 12px 14px; text-align: center; margin: 4px 0 12px; }
.tj-link       { background: none; border: 0; color: var(--accent); font-size: 13px; font-weight: 600;
  cursor: pointer; font-family: inherit; padding: 10px 0; display: block; width: 100%; }
.tj-trip-card  { border: 1px solid var(--line); background: var(--surface); border-radius: 14px;
  padding: 14px 16px; margin-bottom: 10px; cursor: pointer; display: flex; gap: 12px; align-items: center; }
.tj-trip-card:hover { border-color: var(--accent); }
.tj-trip-card-info { flex: 1; min-width: 0; }
.tj-trip-card-name { font-size: 15px; font-weight: 600; }
.tj-trip-card-sub  { font-size: 12px; color: var(--muted); margin-top: 3px; }
.tj-trip-card-chevron { color: var(--faint); font-size: 16px; }

/* ── Settings ── */
.tj-set-block  { background: var(--inset); border-radius: 12px; padding: 14px 16px; margin-bottom: 12px; }
.tj-set-lock-row { display: flex; align-items: center; justify-content: space-between;
  gap: 10px; cursor: pointer; }
.tj-set-lock-label { flex: 1; }
.tj-set-lock-state { font-size: 13px; font-weight: 600; color: var(--muted); transition: color .15s; }
.tj-set-lock-label[data-active="true"] .tj-set-lock-state { color: var(--ink); }
.tj-set-lock-hint  { font-size: 11px; color: var(--faint); margin-top: 2px; }
.tj-set-identity-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.tj-set-divider      { width: 1px; height: 38px; background: var(--line); flex: 0 0 auto; }
.tj-set-memrow { display: flex; align-items: center; gap: 14px; }
.tj-set-avatars { display: flex; gap: 10px; }
.tj-set-avatar { width: 38px; height: 38px; border-radius: 50%; background: var(--surface);
  border: 1.5px solid var(--line-strong); display: flex; align-items: center;
  justify-content: center; font-size: 13px; font-weight: 600; color: var(--muted); }
.tj-set-avatar[data-me="true"] { background: var(--accent); border-color: var(--accent); color: #fff; }
.tj-set-coderow { display: flex; align-items: center; gap: 8px; margin-top: 12px;
  padding-top: 12px; border-top: 1px solid var(--line); font-size: 12px; font-weight: 600; }
.tj-set-coderow .cl { color: var(--faint); font-weight: 400; }
.tj-set-coderow .c  { color: var(--ink); letter-spacing: .05em; font-size: 13px; }
.tj-set-copybtn { margin-left: auto; display: inline-flex; align-items: center; gap: 5px;
  border: 0; background: none; color: var(--accent); font-size: 12px; font-weight: 600;
  cursor: pointer; font-family: inherit; padding: 0; }
.tj-set-copybtn svg { width: 13px; height: 13px; stroke: var(--accent); fill: none;
  stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
.tj-set-rowbtn { display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
.tj-emoji-clear { border: 0; background: none; color: var(--muted); font-size: 12px; font-weight: 600;
  cursor: pointer; font-family: inherit; margin-top: 6px; padding: 4px 0; display: block; }
.tj-cat-chip { display: inline-flex; align-items: center; gap: 4px; background: var(--inset); border-radius: 16px;
  padding: 6px 8px 6px 13px; font-size: 12.5px; font-weight: 600; color: var(--ink); }
.tj-cat-x { border: 0; background: none; color: var(--faint); font-size: 15px; cursor: pointer; padding: 0 3px;
  line-height: 1; font-family: inherit; }
.tj-cat-x:disabled { opacity: .25; }
.tj-set-actions { display: flex; gap: 10px; margin-top: 14px; }

/* ── Step form (trip creation) ── */
.tj-step-wrap  { max-width: 420px; margin: 0 auto; padding: 24px 16px 48px; }
.tj-step-head  { margin-bottom: 28px; }
.tj-step-num   { font-size: 11px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase;
  color: var(--accent); margin-bottom: 6px; }
.tj-step-title { font-family: 'Fraunces', serif; font-size: 24px; font-weight: 600; }
.tj-step-sub   { font-size: 13px; color: var(--muted); margin-top: 4px; line-height: 1.6; }
.tj-member-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.tj-member-num { width: 28px; height: 28px; border-radius: 50%; background: var(--accent-soft);
  color: var(--accent-ink); font-size: 12px; font-weight: 700; display: flex; align-items: center;
  justify-content: center; flex-shrink: 0; }
.tj-code-check { font-size: 12px; margin-top: 6px; min-height: 18px; }
.tj-code-ok    { color: var(--accent-ink); }
.tj-code-err   { color: var(--danger); }
.tj-progress   { display: flex; gap: 6px; margin-bottom: 28px; }
.tj-progress-dot { flex: 1; height: 3px; border-radius: 2px; background: var(--line); }
.tj-progress-dot[data-done="true"] { background: var(--accent); }

/* ── Export ── */
.tj-export-pre { white-space: pre-wrap; font-family: monospace; font-size: 12px;
  background: var(--inset); border-radius: 10px; padding: 14px; line-height: 1.7;
  color: var(--ink); overflow-y: auto; max-height: 50vh; }

@media (prefers-reduced-motion: reduce) {
  .tj-live, .tj-marker::before { animation: none; }
  .tj-overlay, .tj-sheet { animation: none; }
